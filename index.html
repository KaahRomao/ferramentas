<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos</title>
    <link rel="stylesheet" href="./assets/css/style.css">
    <script src="./assets/js/script.js" defer></script>
</head>

<body>

    <header>
        <h1>Painel de Ferramentas</h1>
    </header>

    <main>
        <aside>
            <a id="moedas">Moedas</a>
            <a id="imc">IMC</a>

            <a id="regra">Regra de 3</a>

        <article>

            <!-- Moedas ----------------------------------------------------------------------------------------------------->
            <section class="hidden moedas">
                <form action="">
                    <h2>Conversor de Moedas</h2>
                    <div .resultado-moedas></div>

                    <input type="text" placeholder="Valor em Real">
                    <input type="text" placeholder="Valor em Dolar">

                    <button>Calcular</button>
                </form>
            </section>
            <!-- Final Moedas ------------------------------------------------------------------------------------------------>

            <!-- IMC -------------------------------------------------------------------------------------------------------->
            <section class="hidden imc">
                <form>
                    <h2>Calculador de IMC</h2>
                    <select id="genero" name="genero">
                        <option value="Masculino">Masculino</option>
                        <option value="Feminino">Feminino</option>
                    </select>
                    <input type="text" placeholder="Peso" id="peso">
                    <input type="text" placeholder="altura" id="altura">
                    <button onclick="calcularImc()" type="button" id="calculadorImc">Calcular</button>


                    <div class="resultado-imc"></div>
                    <div class="grupos"></div>
                </form>
            </section>
            <!-- Final IMC ------------------------------------------------------------------------------------------------->


            <section class="hidden temp">
                <form action="">

                        <input type="text" placeholder="Valor">
                        <input type="text" placeholder="Valor">
                    </div>
                    <button>Calcular</button>

            </section>
            <section class="hidden velo">

                    <button>Calcular</button>

            </section>
            <section class="hidden massa">

                    <h2>Lorem, ipsum.</h2>
                    <div>
                        <input type="text" placeholder="Valor">
                        <input type="text" placeholder="Valor">
                    </div>
                    <button>Calcular</button>
                </form>
            </section>
            <section class="hidden regra">
                <form action="">
                    <h2>Lorem, ipsum.</h2>
                    <div>
                        <input type="text" placeholder="Valor">
                        <input type="text" placeholder="Valor">
                    </div>
                    <button>Calcular</button>
                </form>

        </article>

    </main>

    <footer>
        <h2>Footer</h2>
    </footer>

</html>
