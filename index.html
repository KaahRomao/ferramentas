<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos</title>
    <link rel="stylesheet" href="./assets/css/style.css">
    <script src="./assets/js/script.js" defer></script>
</head>

<body>

    <header>
        <h1>Painel de Ferramentas</h1>
    </header>

    <main>
        <aside>
            <a id="moedas">Moedas</a>
            <a id="imc">IMC</a>
            <a id="temp">Temperatura</a>
            <a id="velo">Velocidade</a>
            <a id="massa">Massa</a>
            <a id="regra">Regra de 3</a>
        </aside>
        <article>

            <!-- Moedas ----------------------------------------------------------------------------------------------------->
            <section class="hidden moedas">
                <form action="">
                    <h2>Conversor de Moedas</h2>
                    <p>Cotação do Dolar Atual: 5,02$</p>


                    <div class="campos">
                        <input type="number" placeholder="Valor em Real" id="valorReal" name="real">
                        <p class="campos2">Real (R$)</p>
                    </div>

                    <div class="campos">
                        <input type="number" placeholder="Valor em Dolar" id="valorUsd" name="dolar">
                        <p class="campos2">Dolar ($)</p>
                    </div>
                </form>
            </section>
            <!-- Final Moedas ------------------------------------------------------------------------------------------------>

            <!-- IMC -------------------------------------------------------------------------------------------------------->
            <section class=" hidden imc">
                <form>
                    <h2>Calculador de IMC</h2>
                    <select id="genero" name="genero">
                        <option value="Masculino">Masculino</option>
                        <option value="Feminino">Feminino</option>
                    </select>
                    <input type="text" placeholder="Peso" id="peso">
                    <input type="text" placeholder="altura" id="altura">
                    <button onclick="calcularImc()" type="button" id="calculadorImc">Calcular</button>


                    <div class="resultado-imc"></div>
                    <div class="grupos"></div>
                </form>
            </section>
            <!-- Final IMC ------------------------------------------------------------------------------------------------->

            <!-- Temperatura ----------------------------------------------------------------------------------------------->
            <section class="hidden temp">
                <form action="">
                    <h2>Conversor de Temperatura</h2>

                    <div class="place">
                        <input type="number" placeholder="Valor em Celsius" id="valorC">
                        <p class="place2">ºC (Celsius)</p>
                    </div>
                    <div class="place">
                        <input type="number" placeholder="Valor em Fahrenheit" id="valorF">
                        <p class="place2">ºF (Fahrenheit)</p>
                    </div>
                    <div class="place">
                        <input type="number" placeholder="Valor em Kevin" id="valorK" name="K">
                        <p class="place2">ºK (Kelvin)</p>
                    </div>
                </form>
            </section>

            <!-- Final Temperatura ----------------------------------------------------------------------------------------->


            <section class="hidden velo">
                <form action="">
                    <h2>Lorem, ipsum.</h2>
                    <div>
                        <input type="text" placeholder="Valor">
                        <input type="text" placeholder="Valor">
                    </div>
                    <button>Calcular</button>
                </form>
            </section>
            <section class="hidden massa">
                <form action="">
                    <h2>Lorem, ipsum.</h2>
                    <div>
                        <input type="text" placeholder="Valor">
                        <input type="text" placeholder="Valor">
                    </div>
                    <button>Calcular</button>
                </form>
            </section>
            <section class="hidden regra">
                <form action="">
                    <h2>Lorem, ipsum.</h2>
                    <div>
                        <input type="text" placeholder="Valor">
                        <input type="text" placeholder="Valor">
                    </div>
                    <button>Calcular</button>
                </form>
            </section>
        </article>

    </main>

    <footer>
        <h2>Footer</h2>
    </footer>
</body>

</html>
